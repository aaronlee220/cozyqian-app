name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Android SDK
        run: |
          sdk_root="/usr/local/lib/android/sdk"
          echo "ANDROID_HOME=$sdk_root" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$sdk_root" >> $GITHUB_ENV
          if [ ! -d "$sdk_root/platforms/android-35" ]; then
            echo "y" | $sdk_root/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>&1
          fi

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          ./gradlew assembleDebug --no-daemon 2>&1
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CozyQian-APK
          path: android/app/build/outputs/apk/debug/*.apk
