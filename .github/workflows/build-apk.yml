name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PWA2APK
        run: npm install -g @pwabuilder/pwabuilder-android

      - name: Build APK
        run: |
          mkdir -p www && cp -r *.html *.json *.js *.png images www/ 2>/dev/null || true
          npx @pwabuilder/pwabuilder-android --platform android --project www --out app.apk --name CozyQian --package com.cozyqian.app 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CozyQian-APK
          path: app.apk
