name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Install Android SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq android-sdk 2>/dev/null || true
          export ANDROID_HOME=/usr/lib/android-sdk
          echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/lib/android-sdk" >> $GITHUB_ENV
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          export ANDROID_HOME=/usr/lib/android-sdk
          export ANDROID_SDK_ROOT=/usr/lib/android-sdk
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -80
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: CozyQian-APK
          path: android/app/build/outputs/apk/debug/*.apk
